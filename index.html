/* ─── HELPERS ─── */
const Gold=({children,style={}})=><span style={{color:'var(--gold)',...style}}>{children}</span>;
const Divider=()=><div style={{width:60,height:2,background:'linear-gradient(90deg,transparent,var(--gold),transparent)',margin:'1.5rem auto'}}/>;

/* ─── OTP MODAL ─── */
function OTPModal({phone,onVerify,onClose}){
  const [otp,setOtp]=useState(['','','','','','']);
  const [sent,setSent]=useState(true);
  const [timer,setTimer]=useState(30);
  const refs=useRef([]);
  useEffect(()=>{
    if(timer>0){const t=setTimeout(()=>setTimer(t=>t-1),1000);return()=>clearTimeout(t);}
  },[timer]);
  const handleChange=(i,v)=>{
    if(!/^\d?$/.test(v))return;
    const n=[...otp];n[i]=v;setOtp(n);
    if(v&&i<5)refs.current[i+1]?.focus();
  };
  const handleKey=(i,e)=>{if(e.key==='Backspace'&&!otp[i]&&i>0)refs.current[i-1]?.focus();};
  const verify=()=>{if(otp.join('')==='123456'||otp.join('').length===6)onVerify();};
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'}}>
      <div style={{background:'var(--black3)',border:'1px solid var(--gold)',borderRadius:16,padding:'2.5rem',maxWidth:400,width:'100%',textAlign:'center'}}>
        <div style={{fontSize:40,marginBottom:'1rem'}}>📱</div>
        <h2 style={{fontFamily:'Playfair Display',color:'var(--gold)',marginBottom:'0.5rem'}}>OTP Verification</h2>
        <p style={{color:'var(--gray)',fontSize:14,marginBottom:'2rem'}}>Enter the 6-digit code sent to <br/><Gold>+91 {phone}</Gold></p>
        <div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:'1.5rem'}}>
          {otp.map((d,i)=>(
            <input key={i} ref={el=>refs.current[i]=el} value={d} onChange={e=>handleChange(i,e.target.value)} onKeyDown={e=>handleKey(i,e)} maxLength={1} style={{width:44,height:52,textAlign:'center',fontSize:22,fontWeight:600,background:'var(--black4)',border:'1px solid var(--gold)',borderRadius:8,color:'var(--white)',outline:'none'}}/>
          ))}
        </div>
        <button onClick={verify} style={{width:'100%',padding:'14px',background:'linear-gradient(135deg,var(--gold-dark),var(--gold))',border:'none',borderRadius:8,color:'var(--black)',fontWeight:600,fontSize:16,cursor:'pointer',marginBottom:'1rem'}}>Verify OTP</button>
        <p style={{color:'var(--gray)',fontSize:13}}>{timer>0?`Resend in ${timer}s`:<button onClick={()=>setTimer(30)} style={{background:'none',border:'none',color:'var(--gold)',cursor:'pointer',fontSize:13}}>Resend OTP</button>}</p>
        <p style={{fontSize:11,color:'var(--gray2)',marginTop:'0.5rem'}}>Use 123456 for demo</p>
        <button onClick={onClose} style={{marginTop:'1rem',background:'none',border:'none',color:'var(--gray)',cursor:'pointer',fontSize:13}}>✕ Close</button>
      </div>
    </div>
  );
}

/* ─── AUTH MODAL ─── */
function AuthModal({onLogin,onClose}){
  const [phone,setPhone]=useState('');
  const [step,setStep]=useState('phone');
  const [role,setRole]=useState('user');
  const sendOTP=()=>{if(phone.length===10)setStep('otp');};
  return step==='otp'
    ?<OTPModal phone={phone} onVerify={()=>onLogin({phone,role})} onClose={onClose}/>
    :(
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.85)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:'1rem'}}>
      <div style={{background:'var(--black3)',border:'1px solid var(--gold)',borderRadius:16,padding:'2.5rem',maxWidth:420,width:'100%'}}>
        <h2 style={{fontFamily:'Playfair Display',color:'var(--gold)',textAlign:'center',marginBottom:'0.5rem'}}>Welcome to SSV Tours</h2>
        <p style={{color:'var(--gray)',textAlign:'center',fontSize:14,marginBottom:'1.5rem'}}>Login with your mobile number</p>
        <div style={{display:'flex',gap:8,marginBottom:'1rem'}}>
          {['user','driver','admin'].map(r=>(
            <button key={r} onClick={()=>setRole(r)} style={{flex:1,padding:'10px 0',background:role===r?'var(--gold)':'var(--black4)',color:role===r?'var(--black)':'var(--gray)',border:'1px solid var(--gold)',borderRadius:8,cursor:'pointer',fontSize:13,fontWeight:600,textTransform:'capitalize'}}>{r}</button>
          ))}
        </div>
        <div style={{display:'flex',border:'1px solid var(--gold)',borderRadius:8,overflow:'hidden',marginBottom:'1rem'}}>
          <span style={{padding:'14px 12px',background:'var(--black4)',color:'var(--gold)',fontSize:15,fontWeight:600,whiteSpace:'nowrap'}}>+91</span>
          <input value={phone} onChange={e=>setPhone(e.target.value.replace(/\D/,'').slice(0,10))} placeholder="Mobile Number" type="tel" style={{flex:1,padding:'14px',background:'var(--black5)',border:'none',color:'var(--white)',fontSize:16,outline:'none'}}/>
        </div>
        <button onClick={sendOTP} disabled={phone.length!==10} style={{width:'100%',padding:'14px',background:phone.length===10?'linear-gradient(135deg,var(--gold-dark),var(--gold))':'var(--black4)',border:'none',borderRadius:8,color:phone.length===10?'var(--black)':'var(--gray)',fontWeight:600,fontSize:16,cursor:phone.length===10?'pointer':'not-allowed',marginBottom:'1rem'}}>Send OTP</button>
        <button onClick={onClose} style={{width:'100%',padding:'10px',background:'none',border:'1px solid var(--gray3)',borderRadius:8,color:'var(--gray)',cursor:'pointer',fontSize:14}}>Cancel</button>
      </div>
    </div>
  );
}

/* ─── VEHICLE CARD ─── */
function VehicleCard({v,onBook}){
  const [acMode,setAcMode]=useState(true);

  return(
    <div style={{background:'var(--black3)',border:'1px solid rgba(201,168,76,0.2)',borderRadius:16,overflow:'hidden',transition:'transform 0.3s,border-color 0.3s',cursor:'pointer'}} onMouseEnter={e=>{e.currentTarget.style.transform='translateY(-6px)';e.currentTarget.style.borderColor='var(--gold)';}} onMouseLeave={e=>{e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.borderColor='rgba(201,168,76,0.2)';}}>
      <div style={{background:'linear-gradient(135deg,var(--black4),var(--black5))',padding:'2rem',textAlign:'center',borderBottom:'1px solid rgba(201,168,76,0.15)'}}>
        <div style={{fontSize:64,marginBottom:'0.5rem'}}>{v.img}</div>
        <div style={{display:'inline-block',padding:'4px 16px',background:'rgba(201,168,76,0.15)',border:'1px solid var(--gold)',borderRadius:20,fontSize:12,color:'var(--gold)',letterSpacing:2,textTransform:'uppercase',marginBottom:'0.5rem'}}>{v.tag}</div>
        <h3 style={{fontFamily:'Playfair Display',fontSize:20,color:'var(--white)',marginBottom:'0.25rem'}}>{v.name}</h3>

        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>
          <span style={{color:'var(--gray)',fontSize:13}}>AC Mode</span>
          <button onClick={()=>setAcMode(!acMode)} style={{padding:'6px 16px',background:acMode?'var(--gold)':'var(--black5)',color:acMode?'var(--black)':'var(--gray)',border:'1px solid var(--gold)',borderRadius:20,cursor:'pointer',fontSize:13,fontWeight:600,transition:'all 0.2s'}}>
            {acMode?'❄️ AC':'🔥 Non-AC'}

          <div style={{textAlign:'center',flex:1}}>

          <div style={{textAlign:'center',flex:1}}>

          </div>

          <input type="range" min={10} max={500} value={km} onChange={e=>setKm(+e.target.value)} style={{width:'100%',accentColor:'var(--gold)'}}/>

        </div>
        <button onClick={()=>onBook(v)} style={{width:'100%',padding:'13px',background:'linear-gradient(135deg,var(--gold-dark),var(--gold))',border:'none',borderRadius:10,color:'var(--black)',fontWeight:700,fontSize:15,cursor:'pointer',letterSpacing:0.5}}>Book {v.tag}</button>
      </div>
    </div>

}

/* ─── BOOKING FORM ─── */
function BookingForm({user,vehicles,onLoginNeeded,preVehicle}){
  const [form,setForm]=useState({vehicle:preVehicle?.id||'',from:'',to:'',date:'',time:'',ac:true,km:50,name:'',phone:user?.phone||'',type:'Outstation',payment:'online'});
  const [submitted,setSubmitted]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const selected=vehicles.find(v=>v.id===+form.vehicle);
  const rate=selected?(form.ac?selected.ac:selected.nonAc):0;
  const estimate=rate*form.km;
  const submit=()=>{
    if(!user){onLoginNeeded();return;}
    if(!form.from||!form.to||!form.date||!form.vehicle){alert('Please fill all required fields');return;}
    setSubmitted(true);
  };
  if(submitted)return(
    <div style={{textAlign:'center',padding:'4rem 2rem'}}>
      <div style={{fontSize:64,marginBottom:'1rem'}}>✅</div>
      <h2 style={{fontFamily:'Playfair Display',color:'var(--gold)',fontSize:28,marginBottom:'1rem'}}>Booking Confirmed!</h2>
      <p style={{color:'var(--gray)',marginBottom:'0.5rem'}}>Your ride has been booked successfully.</p>
      <p style={{color:'var(--white)',fontSize:14,marginBottom:'0.5rem'}}>Booking ID: <Gold>SSV-{Date.now().toString().slice(-6)}</Gold></p>
      <p style={{color:'var(--white)',fontSize:14,marginBottom:'2rem'}}>Driver will contact you shortly at <Gold>+91 {form.phone}</Gold></p>
      {form.payment==='online'&&<div style={{background:'var(--black3)',border:'1px solid var(--gold)',borderRadius:12,padding:'1.5rem',maxWidth:360,margin:'0 auto 2rem'}}>
        <p style={{color:'var(--gray)',fontSize:13,marginBottom:'1rem'}}>Pay securely via UPI</p>
        <div style={{display:'flex',gap:8,justifyContent:'center',flexWrap:'wrap'}}>
          {['Google Pay','PhonePe','Paytm','BHIM UPI'].map(m=><a key={m} href={`upi://pay?pa=8309125122@upi&pn=SSVTours&am=${estimate}&cu=INR&tn=TaxiBooking`} style={{padding:'10px 18px',background:'rgba(201,168,76,0.15)',border:'1px solid var(--gold)',borderRadius:8,color:'var(--gold)',textDecoration:'none',fontSize:13,fontWeight:500}}>{m}</a>)}
        </div>
        <p style={{color:'var(--gray2)',fontSize:11,marginTop:'0.75rem'}}>UPI ID: 8309125122@upi | Amount: ₹{estimate}</p>
      </div>}
      <button onClick={()=>setSubmitted(false)} style={{padding:'12px 32px',background:'var(--gold)',border:'none',borderRadius:20,color:'var(--black)',fontWeight:600,cursor:'pointer'}}>Book Another Ride</button>
    </div>
  );
  return(
    <div style={{maxWidth:700,margin:'0 auto',background:'var(--black3)',border:'1px solid rgba(201,168,76,0.25)',borderRadius:20,padding:'2.5rem 2rem'}}>
      <h2 style={{fontFamily:'Playfair Display',color:'var(--gold)',fontSize:28,marginBottom:'0.5rem',textAlign:'center'}}>Book Your Ride</h2>
      <Divider/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
        <div style={{gridColumn:'1/-1'}}>
          <label style={lbl}>Select Vehicle *</label>
          <select value={form.vehicle} onChange={e=>set('vehicle',e.target.value)} style={inp}>
            <option value="">-- Choose Vehicle --</option>
            {vehicles.map(v=><option key={v.id} value={v.id}>{v.name} ({v.tag})</option>)}
          </select>
        </div>
        <div>
          <label style={lbl}>Pickup Location *</label>
          <input value={form.from} onChange={e=>set('from',e.target.value)} placeholder="From (City/Address)" style={inp}/>
        </div>
        <div>
          <label style={lbl}>Drop Location *</label>
          <input value={form.to} onChange={e=>set('to',e.target.value)} placeholder="To (City/Address)" style={inp}/>
        </div>
        <div>
          <label style={lbl}>Date *</label>
          <input type="date" value={form.date} onChange={e=>set('date',e.target.value)} min={new Date().toISOString().split('T')[0]} style={inp}/>
        </div>
        <div>
          <label style={lbl}>Time *</label>
          <input type="time" value={form.time} onChange={e=>set('time',e.target.value)} style={inp}/>

/* ─── COMPLAINT / FEEDBACK ─── */
function FeedbackForm({user,onLoginNeeded}){
  const [tab,setTab]=useState('feedback');
  const [rating,setRating]=useState(0);
  const [msg,setMsg]=useState('');
  const [done,setDone]=useState(false);
  const submit=()=>{
    if(!user){onLoginNeeded();return;}
    setDone(true);setTimeout(()=>{setDone(false);setMsg('');setRating(0);},3000);
  };
  return(
    <div style={{maxWidth:600,margin:'0 auto',background:'var(--black3)',border:'1px solid rgba(201,168,76,0.25)',borderRadius:20,padding:'2rem'}}>
      <div style={{display:'flex',gap:8,marginBottom:'1.5rem'}}>
        {['feedback','complaint'].map(t=><button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:'10px',background:tab===t?'var(--gold)':'var(--black4)',color:tab===t?'var(--black)':'var(--gray)',border:'1px solid '+(tab===t?'var(--gold)':'var(--gray3)'),borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:14,textTransform:'capitalize'}}>{tab===t&&(t==='feedback'?'⭐ ':'⚠️ ')}{t}</button>)}
      </div>
      {tab==='feedback'&&<div style={{display:'flex',gap:8,justifyContent:'center',marginBottom:'1.5rem'}}>
        {[1,2,3,4,5].map(s=><button key={s} onClick={()=>setRating(s)} style={{fontSize:32,background:'none',border:'none',cursor:'pointer',filter:s<=rating?'none':'grayscale(1)',transition:'filter 0.2s'}}>⭐</button>)}
      </div>}
      <textarea value={msg} onChange={e=>setMsg(e.target.value)} placeholder={tab==='feedback'?'Share your experience with us...':'Describe your complaint in detail...'} rows={5} style={{...inp,resize:'vertical',marginBottom:'1rem'}}/>
      {done?<div style={{textAlign:'center',padding:'1rem',color:'#27ae60',fontSize:15}}>✅ {tab==='feedback'?'Thank you for your review!':'Complaint registered. We\'ll contact you soon.'}</div>
      :<button onClick={submit} style={{width:'100%',padding:'13px',background:'linear-gradient(135deg,var(--gold-dark),var(--gold))',border:'none',borderRadius:8,color:'var(--black)',fontWeight:700,fontSize:15,cursor:'pointer'}}>Submit {tab==='feedback'?'Review':'Complaint'}</button>}
    </div>
  );
}
